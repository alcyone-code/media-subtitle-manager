name: Build and Publish Docker Image

on:
  push:
    branches:
      - beta
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/media-subtitle-manager
          tags: |
            # v로 시작하는 git tag 푸시 시 latest 태그 생성
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # v로 시작하는 git tag 자체를 버전으로 매핑 (v1.0.0 등)
            type=semver,pattern={{version}}
            # beta 브랜치 푸시 시 beta 태그 생성
            type=raw,value=beta,enable=${{ github.ref == 'refs/heads/beta' }}
            # 커밋 해시 태그 생성
            type=sha,format=short

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
